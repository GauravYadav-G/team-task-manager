<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D885" />
      <stop offset="50%" stop-color="#D4AF37" />
      <stop offset="100%" stop-color="#AA7C11" />
    </linearGradient>
    <linearGradient id="dark-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D2D29" />
      <stop offset="100%" stop-color="#111110" />
    </linearGradient>
    <filter id="premium-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.25" />
    </filter>
  </defs>

  {/* Outer squircle */}
  <rect 
    x="4" 
    y="4" 
    width="92" 
    height="92" 
    rx="28" 
    fill="url(#dark-gradient)" 
    stroke="url(#gold-gradient)" 
    stroke-width="1.5"
    stroke-opacity="0.4"
  />

  {/* Columns */}
  <rect
    x="24"
    y="28"
    width="14"
    height="44"
    rx="6"
    fill="url(#gold-gradient)"
    opacity="0.85"
  />

  <rect
    x="43"
    y="20"
    width="14"
    height="48"
    rx="6"
    fill="url(#gold-gradient)"
    filter="url(#premium-shadow)"
  />

  <rect
    x="62"
    y="36"
    width="14"
    height="32"
    rx="6"
    fill="url(#gold-gradient)"
    opacity="0.65"
  />

  {/* Velocity arc */}
  <path
    d="M18 64 C 30 76, 70 76, 82 64"
    stroke="url(#gold-gradient)"
    stroke-width="4"
    stroke-linecap="round"
    stroke-dasharray="1 6"
    opacity="0.9"
  />
</svg>
